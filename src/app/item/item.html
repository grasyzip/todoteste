<div class="item">
    <input [id]="tarefa.descricao" type="checkbox" [checked]="tarefa.statusRealizada"
        (change)="tarefa.statusRealizada = !tarefa.statusRealizada;  modificaTarefa.emit()" />
    <label [for]="tarefa.descricao">{{tarefa.descricao}}</label>
    <div *ngIf="!emEdicao" class="btn-wrapper">
        <button class="btn" (click)="emEdicao = true ">Editar</button>
        <button (click)="abrirModalExclusao()">Excluir</button>
    </div>
        <div class="modal" *ngIf="mostrarmodal">
  <div class="modal-content">
    <p>Tem certeza que deseja excluir "{{tarefa.descricao}}"?</p>
    <button (click)="cancelarExclusao()">Cancelar</button>
    <button (click)="confirmarExclusao()">Confirmar</button>
  </div>
</div>
    <div *ngIf="emEdicao">
        <input class="sm-text-input" #editedItem placeholder="escreva o novo nome da tarefa aqui"
            [value]="tarefa.descricao">
        <div class="btn-wrapper">
            <button class="btn" (click)="emEdicao = false ">Cancelar</button>
            <button class="btn btn-save" (click)="tarefa.descricao=editedItem.value; emEdicao = false; modificaTarefa.emit()">Salvar</button>
        </div>
    </div>
</div>
