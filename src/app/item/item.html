<div class="item" [class.completed]="tarefa.statusRealizada" [class.importante]="tarefa.importante">
    <!-- Botão de Bandeira para marcar como importante -->
    <button class="btn-flag" (click)="toggleImportante()" [class.active]="tarefa.importante" title="Marcar como importante">
        🚩
    </button>
    
    <input [id]="tarefa.descricao" type="checkbox" [checked]="tarefa.statusRealizada"
        (change)="tarefa.statusRealizada = !tarefa.statusRealizada; modificaTarefa.emit()" />
    <label [for]="tarefa.descricao">{{tarefa.descricao}}</label>
    
    <div *ngIf="!emEdicao" class="btn-wrapper">
        <button class="btn" (click)="emEdicao = true">Editar</button>
        <button class="btn btn-warn" (click)="onRemover()">Remover</button>
    </div>
    
    <div *ngIf="mostrarmodal" class="modal-confirmacao">
        <div class="modal-content">
            <p>Tem certeza que deseja excluir a tarefa "{{tarefa.descricao}}"?</p>
            <div class="btn-wrapper">
                <button class="btn" (click)="cancelarExclusao()">Cancelar</button>
                <button class="btn btn-danger" (click)="confirmarExclusao()">Excluir</button>
            </div>
        </div>
    </div>
    
    <div *ngIf="emEdicao">
        <input class="sm-text-input" #editedItem placeholder="escreva o novo nome da tarefa aqui"
            [value]="tarefa.descricao">
        <div class="btn-wrapper">
            <button class="btn" (click)="emEdicao = false">Cancelar</button>
            <button class="btn btn-save" (click)="tarefa.descricao=editedItem.value; emEdicao = false; modificaTarefa.emit()">💾 Salvar</button>
        </div>
    </div>
</div>
